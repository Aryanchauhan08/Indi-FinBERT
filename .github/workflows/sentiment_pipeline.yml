name: Financial Sentiment Pipeline

on:
  schedule:
    # 03:30 UTC is 09:00 IST, runs Monday to Friday
    - cron: '30 3 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            # Install baseline dependencies if requirements.txt is missing
            pip install pandas transformers torch streamlit plotly
          fi

      - name: Run live inference
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python live_inference.py

      - name: Commit and push updated sentiment logs
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/sentiment_log.csv
          if ! git diff --cached --quiet; then
            git commit -m "MLOps: Auto-update sentiment logs [skip ci]"
            git push
          else
            echo "No updates detected in sentiment logs."
          fi
